<body
    class="flex flex-col min-h-screen font-body text-on-surface selection:bg-primary-container selection:text-on-primary">

    <!-- Navigation -->
    <nav

        <div class="flex justify-between items-center w-full px-8 py-4 max-w-screen-2xl mx-auto">
            <a href="index.html" class="flex items-center gap-4 group">
                <img src="images/logo.png" alt="3Dream Studios Logo"
                    class="h-12 w-auto mix-blend-screen group-hover:drop-shadow-[0_0_15px_rgba(0,242,255,0.8)] transition-all duration-300">
                <span
                    class="hidden sm:block text-2xl font-black tracking-widest text-cyan-400 drop-shadow-[0_0_8px_rgba(0,242,255,0.5)] font-headline uppercase">

            <div class="hidden md:flex items-center gap-8 font-headline uppercase tracking-tighter text-sm">

                    href="archive.html">Archivo</a>
            </div>
            <a href="cotizar.html"
                class="bg-primary-container text-on-primary px-6 py-2 font-headline font-bold uppercase tracking-widest rounded shadow-[0_0_15px_rgba(0,242,255,0.3)] hover:scale-105 active:scale-95 transition-all duration-300">
                Cotizar
            </a>
        </div>
    </nav>

    <!-- Content -->
    <main class="relative overflow-hidden min-h-screen flex items-center justify-center pt-24 pb-12">
        <!-- Background Auras -->
        <div class="parallax-aura absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary-container/10 blur-[120px] rounded-full pointer-events-none"
            data-speed="40"></div>
        <div class="parallax-aura absolute top-1/3 left-2/3 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-secondary-container/10 blur-[100px] rounded-full pointer-events-none"
            data-speed="-20"></div>
        <div class="w-full max-w-3xl px-8 fade-up-element">
            <div
                class="bg-surface-container-high p-12 rounded-2xl border border-outline-variant/30 glass-edge relative overflow-hidden shadow-2xl">
                <!-- Terminal decorative line -->
                <div
                    class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary-container to-secondary-container">
                </div>

                <div class="mb-10 text-center">
                    <span class="material-symbols-outlined text-4xl text-primary-container mb-4">terminal</span>
                    <h1
                        class="font-headline text-4xl md:text-5xl uppercase tracking-tighter text-primary drop-shadow-2xl font-black">
                        COTIZAR <span
                            class="text-transparent bg-clip-text bg-gradient-to-r from-primary-container to-secondary-container">TU
                            PROYECTO</span>
                    </h1>
                    <p class="font-label text-on-surface-variant text-sm mt-3 tracking-widest uppercase opacity-70">
                        Ingresa los detalles para generar tu cotización...</p>
                </div>

                <form id="connectForm" class="space-y-8">
                    <div>
                        <input id="wa-name" type="text" required class="cyber-input text-xl" placeholder="NOMBRE:" />
                    </div>
                    <div>
                        <input id="wa-email" type="email" required class="cyber-input text-xl" placeholder="EMAIL:" />
                    </div>
                    <div>
                        <select id="wa-service" class="cyber-input text-xl bg-transparent appearance-none" required>
                            <option value="" disabled selected class="bg-surface text-neutral-500">SELECCION DE
                                SERVICIO:</option>
                            <option value="webgl" class="bg-surface">Web En 3D - Experiencias Inmersivas</option>
                            <option value="product" class="bg-surface">Renderizado De Productos</option>
                            <option value="branding" class="bg-surface">Branding Cinemático</option>
                        </select>
                    </div>
                    <div>
                        <textarea id="wa-vision" required class="cyber-input text-xl min-h-[120px] resize-y"
                            placeholder="EXPLICA LA IDEA DE TU PROYECTO..."></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">
                        <button type="button" id="btn-whatsapp"
                            class="w-full flex justify-center items-center gap-3 bg-transparent border-2 border-primary-container text-primary-container px-6 py-4 font-headline text-base md:text-lg uppercase font-bold tracking-[0.1em] transition-all hover:bg-primary-container hover:text-on-primary hover:shadow-[0_0_20px_rgba(0,242,255,0.4)]">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z" />
                            </svg>
                            POR WHATSAPP
                        </button>
                        <button type="button" id="btn-email"
                            class="w-full flex justify-center items-center gap-3 bg-transparent border-2 border-secondary-container text-secondary-container px-6 py-4 font-headline text-base md:text-lg uppercase font-bold tracking-[0.1em] transition-all hover:bg-secondary-container hover:text-on-secondary-container hover:shadow-[0_0_20px_rgba(179,75,255,0.4)]">
                            <span class="material-symbols-outlined">mail</span>
                            POR EMAIL
                        </button>
                    </div>
                </form>

                <script>
                    function buildMessage() {
                        const name = document.getElementById('wa-name').value;
                        const email = document.getElementById('wa-email').value;
                        const serviceNode = document.getElementById('wa-service');
                        const service = serviceNode.options[serviceNode.selectedIndex].text;
                        const vision = document.getElementById('wa-vision').value;

                        if (!name || !email || !vision || serviceNode.selectedIndex === 0) {
                            alert("Por favor completa todos los campos del formulario antes de continuar.");
                            return null;
                        }

                        let message = `¡Hola 3Dream Studios! 🚀\n\n`;
                        message += `Me gustaría cotizar un proyecto. Aquí están mis detalles:\n\n`;
                        message += `*Nombre:* ${name}\n`;
                        message += `*Email:* ${email}\n`;
                        message += `*Servicio:* ${service}\n`;
                        message += `*Visión:* ${vision}\n\n`;
                        message += `¡Quedo a la espera de su respuesta!`;
                        return message;
                    }

                    document.getElementById('btn-whatsapp').addEventListener('click', function () {
                        const message = buildMessage();
                        if (message) {
                            const phone = "527731357457";
                            const encodedMessage = encodeURIComponent(message);
                            const whatsappUrl = `https://wa.me/${phone}?text=${encodedMessage}`;
                            window.open(whatsappUrl, '_blank');
                        }
                    });

                    document.getElementById('btn-email').addEventListener('click', function () {
                        const message = buildMessage();
                        if (message) {
                            // Cambiar asteriscos de markdown a texto plano o html si se usa body puro
                            const plainMessage = message.replace(/\*/g, "");
                            const emailAddress = "b.3dreamstudios@gmail.com";
                            const subject = encodeURIComponent("Nueva Cotización de Proyecto - " + document.getElementById('wa-name').value);
                            const body = encodeURIComponent(plainMessage);
                            const mailtoUrl = `mailto:${emailAddress}?subject=${subject}&body=${body}`;
                            window.location.href = mailtoUrl;
                        }
                    });
                </script>

            </div>
        </div>
    </main>

            <button
